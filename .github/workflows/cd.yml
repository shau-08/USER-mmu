name: CD
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (leave blank to auto-generate <repo>-<branch>-<date>-<sha>)'
        required: false
        type: string
jobs:
  cd:
    permissions:
      contents: write
    uses: shau-08/CICD/.github/workflows/reusable-cd.yml@main
    with:
      tag_name: ${{ inputs.tag_name }}
      build_output_path: generated_sv_dir
    secrets: inherit
